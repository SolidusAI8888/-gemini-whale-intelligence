name: Daily Gemini Whale Scan

on:
  schedule:
    # Avoid GitHub Actions top-of-hour schedule congestion.
    # CEST: 06:17 UTC = 08:17 Berlin. CET: 07:17 UTC = 08:17 Berlin.
    - cron: '17 6 * * *'
    - cron: '17 7 * * *'
  workflow_dispatch:

permissions:
  contents: read

env:
  DATABASE_PATH: data/whale.db
  REPORT_DIR: data/reports
  LOOKBACK_DAYS: ${{ vars.LOOKBACK_DAYS || '200' }}
  SCAN_START_DATE: ${{ vars.SCAN_START_DATE || '2026-01-01' }}
  MAX_COMPANIES: ${{ vars.MAX_COMPANIES || '0' }}
  MIN_OPPORTUNITY_SCORE: ${{ vars.MIN_OPPORTUNITY_SCORE || '55' }}
  SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
  SEND_EMAIL: ${{ vars.SEND_EMAIL || secrets.SEND_EMAIL || 'false' }}
  DRY_RUN: ${{ vars.DRY_RUN || secrets.DRY_RUN || 'true' }}
  EMAIL_PROVIDER: ${{ vars.EMAIL_PROVIDER || secrets.EMAIL_PROVIDER || 'sendgrid' }}
  SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
  EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
  EMAIL_TO: ${{ secrets.EMAIL_TO }}
  SMTP_HOST: ${{ vars.SMTP_HOST || 'smtp.mail.me.com' }}
  SMTP_PORT: ${{ vars.SMTP_PORT || '587' }}
  SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
  SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
  SMTP_STARTTLS: ${{ vars.SMTP_STARTTLS || 'true' }}
  SMTP_FROM_NAME: ${{ vars.SMTP_FROM_NAME || 'Gemini Whale Intelligence' }}
  ENABLE_GEMINI: ${{ secrets.ENABLE_GEMINI || 'true' }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash-lite' }}
  ENABLE_POLITICAL_TRADES: ${{ vars.ENABLE_POLITICAL_TRADES || vars.ENABLE_POLITICAL || secrets.ENABLE_POLITICAL_TRADES || 'true' }}
  POLITICAL_PROVIDER: ${{ vars.POLITICAL_PROVIDER || 'auto' }}
  POLITICAL_UNIVERSE_SCOPE: ${{ vars.POLITICAL_UNIVERSE_SCOPE || 'all' }}
  FMP_HOUSE_ENDPOINTS: ${{ vars.FMP_HOUSE_ENDPOINTS || 'house-latest,house-trades' }}
  FMP_SENATE_ENDPOINTS: ${{ vars.FMP_SENATE_ENDPOINTS || 'senate-latest,senate-trades' }}
  POLITICAL_WATCH_NAMES: ${{ vars.POLITICAL_WATCH_NAMES || 'Pelosi,Trump' }}
  POLITICAL_MAX_FILINGS: ${{ vars.POLITICAL_MAX_FILINGS || '300' }}
  FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
  FMP_CONGRESSIONAL_ENABLED: ${{ vars.FMP_CONGRESSIONAL_ENABLED || 'false' }}
  FMP_MAX_PAGES: ${{ vars.FMP_MAX_PAGES || '5' }}
  FMP_PAGE_LIMIT: ${{ vars.FMP_PAGE_LIMIT || '100' }}
  ENABLE_MARKET_DATA: ${{ vars.ENABLE_MARKET_DATA || 'true' }}
  MARKET_DATA_MAX_SYMBOLS: ${{ vars.MARKET_DATA_MAX_SYMBOLS || '25' }}
  ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
  FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
  ALPHA_DAILY_ENABLED: ${{ vars.ALPHA_DAILY_ENABLED || 'true' }}
  ALPHA_OVERVIEW_ENABLED: ${{ vars.ALPHA_OVERVIEW_ENABLED || 'true' }}
  FINNHUB_BASIC_FINANCIALS_ENABLED: ${{ vars.FINNHUB_BASIC_FINANCIALS_ENABLED || 'true' }}
  FINNHUB_NEWS_ENABLED: ${{ vars.FINNHUB_NEWS_ENABLED || 'true' }}
  FINNHUB_INSIDER_ENABLED: ${{ vars.FINNHUB_INSIDER_ENABLED || 'true' }}
  ENABLE_OGE_EXECUTIVE_TRADES: ${{ vars.ENABLE_OGE_EXECUTIVE_TRADES || 'true' }}
  OGE_TRUMP_REPORT_URLS: ${{ secrets.OGE_TRUMP_REPORT_URLS }}
  OGE_CABINET_REPORTS: ${{ secrets.OGE_CABINET_REPORTS }}
  OGE_MAX_REPORTS: ${{ vars.OGE_MAX_REPORTS || '20' }}
  OGE_EXECUTIVE_WATCHLIST: ${{ vars.OGE_EXECUTIVE_WATCHLIST || 'Donald J. Trump,JD Vance,Marco Rubio,Scott Bessent,Pete Hegseth,Pamela Bondi,Doug Burgum,Brooke Rollins,Howard Lutnick,Lori Chavez-DeRemer,Robert F. Kennedy Jr.,Scott Turner,Sean Duffy,Chris Wright,Linda McMahon,Doug Collins,Kristi Noem,Tulsi Gabbard,Jamieson Greer,Russell Vought,Lee Zeldin,John Ratcliffe,Kelly Loeffler,SEC Chair,FTC Chair' }}
  ENABLE_OGE_AUTO_DISCOVERY: ${{ vars.ENABLE_OGE_AUTO_DISCOVERY || 'true' }}
  OGE_DISCOVERY_URLS: ${{ vars.OGE_DISCOVERY_URLS || 'https://www.oge.gov/web/oge.nsf/Officials%20Individual%20Disclosures%20Search%20Collection?OpenForm' }}
  OGE_DISCOVERY_WATCHLIST: ${{ vars.OGE_DISCOVERY_WATCHLIST || vars.OGE_EXECUTIVE_WATCHLIST || 'Donald J. Trump,JD Vance,Marco Rubio,Scott Bessent,Pete Hegseth,Pamela Bondi,Doug Burgum,Brooke Rollins,Howard Lutnick,Chris Wright,Doug Collins,Kristi Noem,Tulsi Gabbard,John Ratcliffe' }}
  OGE_DISCOVERY_MAX_LINKS: ${{ vars.OGE_DISCOVERY_MAX_LINKS || '50' }}
  OGE_SEED_CABINET_REPORTS_ENABLED: ${{ vars.OGE_SEED_CABINET_REPORTS_ENABLED || 'true' }}
  ENABLE_OGE_ASSET_DISCLOSURES: ${{ vars.ENABLE_OGE_ASSET_DISCLOSURES || 'true' }}
  OGE_SEED_CABINET_REPORTS: ${{ secrets.OGE_SEED_CABINET_REPORTS }}

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check Berlin 08:00 window
        id: berlin_window
        run: |
          UTC_NOW=$(date -u '+%Y-%m-%d %H:%M:%S %Z')
          BERLIN_NOW=$(TZ=Europe/Berlin date '+%Y-%m-%d %H:%M:%S %Z')
          BERLIN_HOUR=$(TZ=Europe/Berlin date +%H)
          BERLIN_MINUTE=$(TZ=Europe/Berlin date +%M)
          echo "current_utc=$UTC_NOW"
          echo "current_berlin=$BERLIN_NOW"
          echo "berlin_hour=$BERLIN_HOUR berlin_minute=$BERLIN_MINUTE"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run_daily_email=true reason=manual_dispatch"
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Scheduled runs are intentionally fired at 06:17/07:17 UTC.
          # Exactly one of them should land inside Berlin's 08:00 hour, depending on DST.
          if [ "$BERLIN_HOUR" = "08" ]; then
            echo "should_run_daily_email=true reason=berlin_08_hour"
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run_daily_email=false reason=not_berlin_08_hour"
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping scheduled run because Berlin local time is $BERLIN_NOW, not during the 08:00 hour."
          fi
      - name: Set up Python
        if: steps.berlin_window.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        if: steps.berlin_window.outputs.run == 'true'
        run: pip install -r requirements.txt
      - name: Run tests
        if: steps.berlin_window.outputs.run == 'true'
        run: pytest -q
      - name: Run daily scan
        if: steps.berlin_window.outputs.run == 'true'
        run: python -m app.main
      - name: Upload report artifact
        if: always() && steps.berlin_window.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: gemini-whale-report
          path: |
            data/reports/*.html
            data/whale.db
          if-no-files-found: ignore
