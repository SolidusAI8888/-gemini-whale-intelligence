name: Daily Gemini Whale Scan

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read

env:
  DATABASE_PATH: data/whale.db
  REPORT_DIR: data/reports
  LOOKBACK_DAYS: ${{ vars.LOOKBACK_DAYS || '3' }}
  MAX_COMPANIES: ${{ vars.MAX_COMPANIES || '0' }}
  MIN_OPPORTUNITY_SCORE: ${{ vars.MIN_OPPORTUNITY_SCORE || '55' }}
  SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
  SEND_EMAIL: ${{ secrets.SEND_EMAIL || 'false' }}
  DRY_RUN: ${{ secrets.DRY_RUN || 'true' }}
  SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
  EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
  EMAIL_TO: ${{ secrets.EMAIL_TO }}
  ENABLE_GEMINI: ${{ secrets.ENABLE_GEMINI || 'true' }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash-lite' }}
  ENABLE_POLITICAL_TRADES: ${{ secrets.ENABLE_POLITICAL_TRADES || 'true' }}
  POLITICAL_PROVIDER: ${{ vars.POLITICAL_PROVIDER || 'auto' }}
  POLITICAL_MAX_FILINGS: ${{ vars.POLITICAL_MAX_FILINGS || '300' }}
  FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
  FMP_MAX_PAGES: ${{ vars.FMP_MAX_PAGES || '5' }}
  FMP_PAGE_LIMIT: ${{ vars.FMP_PAGE_LIMIT || '100' }}

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest -q
      - name: Run daily scan
        run: python -m app.main
      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gemini-whale-report
          path: |
            data/reports/*.html
            data/whale.db
          if-no-files-found: ignore
