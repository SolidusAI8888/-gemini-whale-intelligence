name: Daily Gemini Whale Scan

on:
  schedule:
    # Fail-safe daily window. GitHub scheduled workflows can be delayed or dropped,
    # especially around common times. Run repeated lightweight attempts after the
    # Berlin 08:00 target; the daily gate below sends at most one email per
    # Berlin date.
    # Summer: first eligible attempt is 06:17 UTC = 08:17 Berlin.
    # Winter: 06:17 UTC is before 08:00 and skips; 07:17 UTC = 08:17 Berlin sends.
    # Dense morning attempts improve delivery around the Berlin 08:00 target.
    # Summer CEST: 06:07/22/37/52 UTC = 08:07/22/37/52 Berlin.
    # Winter CET: 07:07/22/37/52 UTC = 08:07/22/37/52 Berlin.
    - cron: '7,22,37,52 5-10 * * *'
    # Lower-frequency backup attempts later in the day.
    - cron: '17 11-18 * * *'
  workflow_dispatch:

permissions:
  contents: read

env:
  DATABASE_PATH: data/whale.db
  REPORT_DIR: data/reports
  LOOKBACK_DAYS: ${{ vars.LOOKBACK_DAYS || '200' }}
  SCAN_START_DATE: ${{ vars.SCAN_START_DATE || '2026-01-01' }}
  MAX_COMPANIES: ${{ vars.MAX_COMPANIES || '0' }}
  MIN_OPPORTUNITY_SCORE: ${{ vars.MIN_OPPORTUNITY_SCORE || '55' }}
  SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
  SEND_EMAIL: ${{ vars.SEND_EMAIL || secrets.SEND_EMAIL || 'false' }}
  DRY_RUN: ${{ vars.DRY_RUN || secrets.DRY_RUN || 'true' }}
  EMAIL_PROVIDER: ${{ vars.EMAIL_PROVIDER || secrets.EMAIL_PROVIDER || 'sendgrid' }}
  SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
  EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
  EMAIL_TO: ${{ secrets.EMAIL_TO }}
  SMTP_HOST: ${{ vars.SMTP_HOST || 'smtp.mail.me.com' }}
  SMTP_PORT: ${{ vars.SMTP_PORT || '587' }}
  SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
  SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
  SMTP_STARTTLS: ${{ vars.SMTP_STARTTLS || 'true' }}
  SMTP_FROM_NAME: ${{ vars.SMTP_FROM_NAME || 'Gemini Whale Intelligence' }}
  ENABLE_GEMINI: ${{ secrets.ENABLE_GEMINI || 'true' }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash-lite' }}
  ENABLE_POLITICAL_TRADES: ${{ vars.ENABLE_POLITICAL_TRADES || vars.ENABLE_POLITICAL || secrets.ENABLE_POLITICAL_TRADES || 'true' }}
  POLITICAL_PROVIDER: ${{ vars.POLITICAL_PROVIDER || 'auto' }}
  POLITICAL_UNIVERSE_SCOPE: ${{ vars.POLITICAL_UNIVERSE_SCOPE || 'all' }}
  FMP_HOUSE_ENDPOINTS: ${{ vars.FMP_HOUSE_ENDPOINTS || 'house-latest,house-trades' }}
  FMP_SENATE_ENDPOINTS: ${{ vars.FMP_SENATE_ENDPOINTS || 'senate-latest,senate-trades' }}
  POLITICAL_WATCH_NAMES: ${{ vars.POLITICAL_WATCH_NAMES || 'Pelosi,Trump' }}
  POLITICAL_MAX_FILINGS: ${{ vars.POLITICAL_MAX_FILINGS || '300' }}
  FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
  FMP_CONGRESSIONAL_ENABLED: ${{ vars.FMP_CONGRESSIONAL_ENABLED || 'false' }}
  FMP_MAX_PAGES: ${{ vars.FMP_MAX_PAGES || '5' }}
  FMP_PAGE_LIMIT: ${{ vars.FMP_PAGE_LIMIT || '100' }}
  ENABLE_MARKET_DATA: ${{ vars.ENABLE_MARKET_DATA || 'true' }}
  MARKET_DATA_MAX_SYMBOLS: ${{ vars.MARKET_DATA_MAX_SYMBOLS || '25' }}
  ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
  FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
  ALPHA_DAILY_ENABLED: ${{ vars.ALPHA_DAILY_ENABLED || 'true' }}
  ALPHA_OVERVIEW_ENABLED: ${{ vars.ALPHA_OVERVIEW_ENABLED || 'true' }}
  FINNHUB_BASIC_FINANCIALS_ENABLED: ${{ vars.FINNHUB_BASIC_FINANCIALS_ENABLED || 'true' }}
  FINNHUB_NEWS_ENABLED: ${{ vars.FINNHUB_NEWS_ENABLED || 'true' }}
  FINNHUB_INSIDER_ENABLED: ${{ vars.FINNHUB_INSIDER_ENABLED || 'true' }}
  ENABLE_OGE_EXECUTIVE_TRADES: ${{ vars.ENABLE_OGE_EXECUTIVE_TRADES || 'true' }}
  OGE_TRUMP_REPORT_URLS: ${{ secrets.OGE_TRUMP_REPORT_URLS }}
  OGE_CABINET_REPORTS: ${{ secrets.OGE_CABINET_REPORTS }}
  OGE_MAX_REPORTS: ${{ vars.OGE_MAX_REPORTS || '20' }}
  OGE_EXECUTIVE_WATCHLIST: ${{ vars.OGE_EXECUTIVE_WATCHLIST || 'Donald J. Trump,JD Vance,Marco Rubio,Scott Bessent,Pete Hegseth,Pamela Bondi,Doug Burgum,Brooke Rollins,Howard Lutnick,Lori Chavez-DeRemer,Robert F. Kennedy Jr.,Scott Turner,Sean Duffy,Chris Wright,Linda McMahon,Doug Collins,Kristi Noem,Tulsi Gabbard,Jamieson Greer,Russell Vought,Lee Zeldin,John Ratcliffe,Kelly Loeffler,SEC Chair,FTC Chair' }}
  ENABLE_OGE_AUTO_DISCOVERY: ${{ vars.ENABLE_OGE_AUTO_DISCOVERY || 'true' }}
  OGE_DISCOVERY_URLS: ${{ vars.OGE_DISCOVERY_URLS || 'https://www.oge.gov/web/oge.nsf/Officials%20Individual%20Disclosures%20Search%20Collection?OpenForm' }}
  OGE_DISCOVERY_WATCHLIST: ${{ vars.OGE_DISCOVERY_WATCHLIST || vars.OGE_EXECUTIVE_WATCHLIST || 'Donald J. Trump,JD Vance,Marco Rubio,Scott Bessent,Pete Hegseth,Pamela Bondi,Doug Burgum,Brooke Rollins,Howard Lutnick,Chris Wright,Doug Collins,Kristi Noem,Tulsi Gabbard,John Ratcliffe' }}
  OGE_DISCOVERY_MAX_LINKS: ${{ vars.OGE_DISCOVERY_MAX_LINKS || '50' }}
  OGE_SEED_CABINET_REPORTS_ENABLED: ${{ vars.OGE_SEED_CABINET_REPORTS_ENABLED || 'true' }}
  ENABLE_OGE_ASSET_DISCLOSURES: ${{ vars.ENABLE_OGE_ASSET_DISCLOSURES || 'true' }}
  OGE_SEED_CABINET_REPORTS: ${{ secrets.OGE_SEED_CABINET_REPORTS }}
  ENABLE_INSTITUTIONAL_13F: ${{ vars.ENABLE_INSTITUTIONAL_13F || 'true' }}
  INSTITUTIONAL_13F_WATCHLIST: ${{ vars.INSTITUTIONAL_13F_WATCHLIST || '' }}
  INSTITUTIONAL_13F_MAX_MANAGERS: ${{ vars.INSTITUTIONAL_13F_MAX_MANAGERS || '20' }}
  INSTITUTIONAL_13F_FILINGS_PER_MANAGER: ${{ vars.INSTITUTIONAL_13F_FILINGS_PER_MANAGER || '1' }}
  INSTITUTIONAL_13F_MAX_HOLDINGS_PER_FILING: ${{ vars.INSTITUTIONAL_13F_MAX_HOLDINGS_PER_FILING || '25' }}

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore persistent scan state
        id: restore_state
        uses: actions/cache/restore@v4
        with:
          path: |
            data/whale.db
            data/last_email_date.txt
          key: whale-state-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            whale-state-${{ runner.os }}-

      - name: Check Berlin daily send gate
        id: berlin_gate
        run: |
          mkdir -p data
          UTC_NOW=$(date -u '+%Y-%m-%d %H:%M:%S %Z')
          BERLIN_NOW=$(TZ=Europe/Berlin date '+%Y-%m-%d %H:%M:%S %Z')
          BERLIN_DATE=$(TZ=Europe/Berlin date '+%Y-%m-%d')
          BERLIN_HOUR=$(TZ=Europe/Berlin date +%H)
          BERLIN_MINUTE=$(TZ=Europe/Berlin date +%M)
          LAST_EMAIL_DATE=""
          if [ -f data/last_email_date.txt ]; then
            LAST_EMAIL_DATE=$(cat data/last_email_date.txt | tr -d '[:space:]')
          fi
          echo "current_utc=$UTC_NOW"
          echo "current_berlin=$BERLIN_NOW"
          echo "berlin_date=$BERLIN_DATE berlin_hour=$BERLIN_HOUR berlin_minute=$BERLIN_MINUTE"
          echo "last_email_date=${LAST_EMAIL_DATE:-none}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run_daily_email=true reason=manual_dispatch"
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "scheduled_daily=false" >> "$GITHUB_OUTPUT"
            echo "berlin_date=$BERLIN_DATE" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Scheduled runs fire hourly in a broad fail-safe window. The first
          # attempt after Berlin 08:00 sends; later attempts skip after seeing
          # data/last_email_date.txt for the same Berlin date. This avoids both
          # GitHub cron delays/drops and DST edge cases.
          if [ "$BERLIN_HOUR" -lt 8 ]; then
            echo "should_run_daily_email=false reason=before_berlin_08"
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "scheduled_daily=true" >> "$GITHUB_OUTPUT"
            echo "berlin_date=$BERLIN_DATE" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$LAST_EMAIL_DATE" = "$BERLIN_DATE" ]; then
            echo "should_run_daily_email=false reason=already_sent_for_berlin_date"
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "scheduled_daily=true" >> "$GITHUB_OUTPUT"
            echo "berlin_date=$BERLIN_DATE" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_run_daily_email=true reason=first_eligible_scheduled_run_for_berlin_date"
          echo "run=true" >> "$GITHUB_OUTPUT"
          echo "scheduled_daily=true" >> "$GITHUB_OUTPUT"
          echo "berlin_date=$BERLIN_DATE" >> "$GITHUB_OUTPUT"

      - name: Show restored state
        if: steps.berlin_gate.outputs.run == 'true'
        run: |
          if [ -f data/whale.db ]; then
            echo "Restored prior whale.db state: $(du -h data/whale.db | cut -f1)"
          else
            echo "No prior whale.db state restored; this run will be treated as initial baseline."
          fi
          if [ -f data/last_email_date.txt ]; then
            echo "Last successful scheduled email date: $(cat data/last_email_date.txt)"
          else
            echo "No prior scheduled email marker restored."
          fi

      - name: Set up Python
        if: steps.berlin_gate.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        if: steps.berlin_gate.outputs.run == 'true'
        run: pip install -r requirements.txt
      - name: Run tests
        if: steps.berlin_gate.outputs.run == 'true'
        run: pytest -q
      - name: Show effective email gate
        if: steps.berlin_gate.outputs.run == 'true'
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "berlin_gate_run=${{ steps.berlin_gate.outputs.run }}"
          echo "scheduled_daily=${{ steps.berlin_gate.outputs.scheduled_daily }}"
          echo "berlin_date=${{ steps.berlin_gate.outputs.berlin_date }}"
          echo "SEND_EMAIL_CONFIGURED=${SEND_EMAIL}"
          echo "FORCE_SEND_EMAIL=true"
          echo "EMAIL_PROVIDER=${EMAIL_PROVIDER}"
          echo "SMTP_HOST=${SMTP_HOST}"
          echo "SMTP_PORT=${SMTP_PORT}"
          if [ -n "${EMAIL_TO}" ]; then echo "EMAIL_TO_SET=true"; else echo "EMAIL_TO_SET=false"; fi
          if [ -n "${SMTP_USERNAME}" ]; then echo "SMTP_USERNAME_SET=true"; else echo "SMTP_USERNAME_SET=false"; fi
      - name: Run daily scan and force email for eligible runs
        if: steps.berlin_gate.outputs.run == 'true'
        env:
          # Once the daily gate chooses to run, this job must send a report even
          # when there are zero new disclosures. This is the single source of
          # truth for scheduled and manual runs.
          FORCE_SEND_EMAIL: 'true'
          SEND_EMAIL: 'true'
        run: python -m app.main
      - name: Backup scheduled SMTP delivery if app did not mark email sent
        if: success() && steps.berlin_gate.outputs.run == 'true' && steps.berlin_gate.outputs.scheduled_daily == 'true'
        env:
          SMTP_HOST: ${{ vars.SMTP_HOST || 'smtp.mail.me.com' }}
          SMTP_PORT: ${{ vars.SMTP_PORT || '587' }}
          SMTP_STARTTLS: ${{ vars.SMTP_STARTTLS || 'true' }}
          SMTP_FROM_NAME: ${{ vars.SMTP_FROM_NAME || 'Gemini Whale Intelligence' }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          if [ -f data/email_sent.flag ]; then
            echo "Application already marked email sent; backup SMTP delivery skipped."
            exit 0
          fi
          echo "No data/email_sent.flag found after scan; running backup scheduled SMTP delivery."
          python - <<'PY'
          from __future__ import annotations
          import os, smtplib, glob
          from datetime import datetime
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText
          from email.utils import formataddr
          from pathlib import Path

          reports = sorted(glob.glob('data/reports/*.html'), key=os.path.getmtime)
          if not reports:
              raise RuntimeError('No HTML report found for backup scheduled email delivery')
          report_path = reports[-1]
          html = Path(report_path).read_text(encoding='utf-8')
          email_from = os.environ.get('EMAIL_FROM', '').strip()
          email_to = os.environ.get('EMAIL_TO', '').strip()
          username = os.environ.get('SMTP_USERNAME', '').strip()
          password = os.environ.get('SMTP_PASSWORD', '')
          if not (email_from and email_to and username and password):
              raise RuntimeError('Backup SMTP missing EMAIL_FROM/EMAIL_TO/SMTP_USERNAME/SMTP_PASSWORD')
          host = os.environ.get('SMTP_HOST', 'smtp.mail.me.com').strip()
          port = int(os.environ.get('SMTP_PORT', '587'))
          starttls = os.environ.get('SMTP_STARTTLS', 'true').strip().lower() in {'1','true','yes','on'}
          from_name = os.environ.get('SMTP_FROM_NAME', 'Gemini Whale Intelligence')
          recipients = [x.strip() for x in email_to.replace(';', ',').split(',') if x.strip()]
          subject = f"Gemini-美股聪明钱_政商巨鲸行动追踪 {datetime.now().strftime('%Y-%m-%d')}（自动补发）"

          msg = MIMEMultipart('alternative')
          msg['Subject'] = subject
          msg['From'] = formataddr((from_name, email_from)) if from_name else email_from
          msg['To'] = email_to
          msg.attach(MIMEText('请使用支持 HTML 的邮件客户端查看本日报。', 'plain', 'utf-8'))
          msg.attach(MIMEText(html, 'html', 'utf-8'))

          print(f'Backup SMTP sending host={host} port={port} recipients={len(recipients)} report={report_path}')
          with smtplib.SMTP(host, port, timeout=45) as server:
              server.ehlo()
              if starttls:
                  server.starttls()
                  server.ehlo()
              server.login(username, password)
              server.sendmail(email_from, recipients, msg.as_string())
          Path('data/email_sent.flag').write_text(datetime.utcnow().isoformat(timespec='seconds'), encoding='utf-8')
          print('Backup scheduled SMTP email sent and marker written.')
          PY
      - name: Mark Berlin daily email sent
        if: success() && steps.berlin_gate.outputs.run == 'true' && steps.berlin_gate.outputs.scheduled_daily == 'true'
        run: |
          mkdir -p data
          echo "${{ steps.berlin_gate.outputs.berlin_date }}" > data/last_email_date.txt
          echo "Marked scheduled email sent for Berlin date ${{ steps.berlin_gate.outputs.berlin_date }}"
      - name: Upload report artifact
        if: always() && steps.berlin_gate.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: gemini-whale-report
          path: |
            data/reports/*.html
            data/whale.db
            data/last_email_date.txt
          if-no-files-found: ignore
      - name: Save persistent scan state
        if: always() && steps.berlin_gate.outputs.run == 'true' && hashFiles('data/whale.db') != ''
        uses: actions/cache/save@v4
        with:
          path: |
            data/whale.db
            data/last_email_date.txt
          key: whale-state-${{ runner.os }}-${{ github.run_id }}
